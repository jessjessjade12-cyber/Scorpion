name: Unit Tests

on:
  push:
  pull_request:

jobs:
  lua-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua 5.1
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Run Unit Tests
        run: lua5.1 tests/run.lua
